<a class="product" href="#">
    <div class="row g-3">
        <h1 class="text-center mb-4">Our Products</h1>
  @for (product of products(); track product.id) {
    <div class="col-12  col-sm-6 col-md-4  h-100 ">
      <app-product-items 
      
      [product]="product"
      (displayProductViewModal)="onDisplayProductViewModal($event)"
       />
    </div>
  }
</div>
@if (isDisplayModal() && modalProduct())
{
    <app-modal-product-view

    [product]="modalProduct()"
    (close)="onCloseModal()"
    />
}
