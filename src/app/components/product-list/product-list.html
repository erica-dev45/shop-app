<a class="prod" href="#">

    <div class="container-fluid py-4 " id="product">
       
            <h1  class="text-center mb-4 ">Our Products</h1>
        <div class="row g-3">
            @for (product of products; track product.id) {
                <div class="col-12 col-md-3">
                    <div class="card h-100 border-0 shadow-sm">
                        <img src="{{product.url}}" class="card-img-top" alt="products">
                    <div class="card-body">
                        <p class="card-title mt-2 fw-bold">{{product.discription}}</p>
                        <div class="price fw-bold">{{product.price |currency}}</div>
                    </div>    

                    </div>

                </div>
            }
        </div>
    </div>
</a>
